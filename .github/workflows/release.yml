name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的 Git tag，例如 v0.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt packaging pyyaml pytest pytest-asyncio pillow

      - name: Build plugin page
        run: |
          npm ci --prefix frontend
          npm run build --prefix frontend

      - name: Validate release version
        id: release_contract
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          python - <<'PY'
          from __future__ import annotations

          import os
          import re
          import tomllib
          from pathlib import Path

          import yaml
          from packaging.version import Version

          tag = os.environ["RELEASE_TAG"]
          metadata = yaml.safe_load(Path("metadata.yaml").read_text(encoding="utf-8"))
          project = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          main_text = Path("main.py").read_text(encoding="utf-8")

          metadata_version = metadata.get("version")
          project_version = project["project"]["version"]
          register_match = re.search(
              r'@register\(\s*"astrbot_plugin_webhook_notifier",\s*'
              r'"AsterleedsGuild0",\s*.*?,\s*"([^"]+)"\s*,?\s*\)',
              main_text,
              re.DOTALL,
          )
          main_version = register_match.group(1) if register_match else None

          errors = []
          if metadata_version != tag:
              errors.append(f"metadata.yaml version {metadata_version!r} != tag {tag!r}")
          if main_version != tag:
              errors.append(f"main.py @register version {main_version!r} != tag {tag!r}")
          if Version(project_version) != Version(tag.removeprefix("v")):
              errors.append(
                  "pyproject.toml PEP 440 version "
                  f"{project_version!r} is not equivalent to tag {tag!r}"
              )

          if errors:
              raise SystemExit("\n".join(errors))

          version = Version(tag.removeprefix("v"))
          prerelease = version.is_prerelease or version.is_devrelease
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write(f"prerelease={str(prerelease).lower()}\n")
              output.write(f"make_latest={str(not prerelease).lower()}\n")
          PY

      - name: Run tests
        run: python -m pytest

      - name: Build plugin archive
        run: python scripts/package_plugin.py

      - name: Extract release notes
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          python - <<'PY'
          from __future__ import annotations

          import os
          import re
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = re.compile(
              rf"^##\s+{re.escape(tag)}(?:\s+-\s+[^\n]+)?\n(?P<body>.*?)(?=\n---\n\n##\s+|\n##\s+v|\Z)",
              re.MULTILINE | re.DOTALL,
          )
          match = pattern.search(changelog)
          if not match:
              raise SystemExit(f"Cannot find {tag} section in CHANGELOG.md")

          body = match.group("body").strip()
          Path("release-notes.md").write_text(body + "\n", encoding="utf-8")
          PY

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-release-${{ inputs.tag || github.ref_name }}
          path: dist/*.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          body_path: release-notes.md
          files: dist/*.zip
          fail_on_unmatched_files: true
          prerelease: ${{ steps.release_contract.outputs.prerelease }}
          make_latest: ${{ steps.release_contract.outputs.make_latest }}
